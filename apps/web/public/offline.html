<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>You're offline · ClinikNote</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F766E" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family:
          "Inter",
          ui-sans-serif,
          system-ui,
          sans-serif,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .card {
        width: 100%;
        max-width: 28rem;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        padding: 2rem 1.5rem;
        text-align: center;
        box-shadow: 0 8px 24px -12px rgba(15, 118, 110, 0.15);
      }
      .icon-wrap {
        width: 4.5rem;
        height: 4.5rem;
        margin: 0 auto 1rem;
        background: #0a7b6c;
        border-radius: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-wrap svg {
        width: 3rem;
        height: 3rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
        color: #0f172a;
      }
      p {
        color: #475569;
        margin: 0 0 1.25rem;
        line-height: 1.55;
        font-size: 0.95rem;
      }
      .brand {
        display: inline-block;
        color: #0a7b6c;
        font-weight: 600;
        letter-spacing: 0.02em;
        font-size: 0.75rem;
        text-transform: uppercase;
      }
      button {
        appearance: none;
        border: none;
        background: #0a7b6c;
        color: white;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 500;
        padding: 0.7rem 1.25rem;
        border-radius: 0.5rem;
        cursor: pointer;
        min-width: 8rem;
        transition: background 0.15s ease;
      }
      button:hover,
      button:focus-visible {
        background: #0f766e;
        outline: none;
      }
      button:active {
        transform: scale(0.98);
      }
      .hint {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon-wrap">
        <!-- Amit msg 2318: previously loaded /icon.svg via an <img>
             src, but the offline SW doesn't intercept non-navigation
             requests so the asset fetch failed and the broken-image
             icon showed up on the offline card. Inline the SVG
             directly so the offline page never depends on the
             network. The same shape lives in /icon.svg for the rest
             of the app. -->
        <svg
          viewBox="0 0 1477 1477"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="ClinikNote"
        >
          <path
            d="M1060 320C1131.8 320 1190 378.203 1190 450V1210C1190 1281.8 1131.8 1340 1060 1340H420C348.203 1340 290 1281.8 290 1210V450C290 378.203 348.203 320 420 320H1060ZM460 410C415.817 410 380 445.817 380 490V1170C380 1214.18 415.817 1250 460 1250H1020C1064.18 1250 1100 1214.18 1100 1170V490C1100 445.817 1064.18 410 1020 410H460Z"
            fill="#ffffff"
          />
          <path
            d="M771 650C784.255 650 795 660.745 795 674V775H896C909.255 775 920 785.745 920 799V861C920 874.255 909.255 885 896 885H795V986C795 999.255 784.255 1010 771 1010H709C695.745 1010 685 999.255 685 986V885H584C570.745 885 560 874.255 560 861V799C560 785.745 570.745 775 584 775H685V674C685 660.745 695.745 650 709 650H771Z"
            fill="#ffffff"
          />
          <path
            d="M740 130C789.706 130 830 170.294 830 220C830 269.706 789.706 310 740 310C690.294 310 650 269.706 650 220C650 170.294 690.294 130 740 130ZM740 180C717.909 180 700 197.909 700 220C700 242.091 717.909 260 740 260C762.091 260 780 242.091 780 220C780 197.909 762.091 180 740 180Z"
            fill="#e2e8f0"
          />
          <rect
            x="505"
            y="235"
            width="470"
            height="180"
            rx="40"
            fill="#e2e8f0"
          />
        </svg>
      </div>
      <div class="brand">ClinikNote</div>
      <h1>You're offline</h1>
      <p>
        Looks like your device isn't connected to the internet. Your saved
        data is safe — we'll sync everything once the connection is back.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint">
        If this persists on Wi-Fi, check whether the network needs a login
        page (captive portal).
      </p>
    </main>
    <script>
      // Auto-reload the moment connectivity is restored so the doctor
      // doesn't have to tap "Try again."
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
