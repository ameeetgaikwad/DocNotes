<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>You're offline · ClinikNote</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F766E" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family:
          "Inter",
          ui-sans-serif,
          system-ui,
          sans-serif,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .card {
        width: 100%;
        max-width: 28rem;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        padding: 2rem 1.5rem;
        text-align: center;
        box-shadow: 0 8px 24px -12px rgba(15, 118, 110, 0.15);
      }
      .icon-wrap {
        width: 4.5rem;
        height: 4.5rem;
        margin: 0 auto 1rem;
        background: #0a7b6c;
        border-radius: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-wrap img {
        width: 3rem;
        height: 3rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
        color: #0f172a;
      }
      p {
        color: #475569;
        margin: 0 0 1.25rem;
        line-height: 1.55;
        font-size: 0.95rem;
      }
      .brand {
        display: inline-block;
        color: #0a7b6c;
        font-weight: 600;
        letter-spacing: 0.02em;
        font-size: 0.75rem;
        text-transform: uppercase;
      }
      button {
        appearance: none;
        border: none;
        background: #0a7b6c;
        color: white;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 500;
        padding: 0.7rem 1.25rem;
        border-radius: 0.5rem;
        cursor: pointer;
        min-width: 8rem;
        transition: background 0.15s ease;
      }
      button:hover,
      button:focus-visible {
        background: #0f766e;
        outline: none;
      }
      button:active {
        transform: scale(0.98);
      }
      .hint {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon-wrap">
        <img src="/icon.svg" alt="ClinikNote" />
      </div>
      <div class="brand">ClinikNote</div>
      <h1>You're offline</h1>
      <p>
        Looks like your device isn't connected to the internet. Your saved
        data is safe — we'll sync everything once the connection is back.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint">
        If this persists on Wi-Fi, check whether the network needs a login
        page (captive portal).
      </p>
    </main>
    <script>
      // Auto-reload the moment connectivity is restored so the doctor
      // doesn't have to tap "Try again."
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
